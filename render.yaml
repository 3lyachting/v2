# Render Blueprint : https://render.com/docs/blueprint-spec
# Après "New → Blueprint" : lie ce dépôt, Render crée l’app + la base.
# Puis dans le dashboard, ajoutez vos secrets (OAuth, SMTP, clés Vite, etc.).

databases:
  - name: catamaran-croisieres-db
    plan: free
    region: frankfurt

services:
  - type: web
    name: catamaran-croisieres
    plan: free
    region: frankfurt
    runtime: node
    # pnpm sert au build (lockfile). Le démarrage utilise `npm start` (Node fournit toujours npm).
    buildCommand: npm install -g pnpm@10.4.1 && pnpm install --frozen-lockfile && pnpm run build && pnpm run db:migrate
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: catamaran-croisieres-db
          property: connectionString
      # Secrets à compléter dans le dashboard Render (ou décommentez / ajoutez des clés) :
      # - key: VITE_APP_ID
      #   sync: false
      # - key: VITE_OAUTH_HOST
      #   sync: false
      # - key: OWNER_OPEN_ID
      #   sync: false
      # - key: SMTP_HOST
      #   sync: false
